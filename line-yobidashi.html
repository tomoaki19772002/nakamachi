<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE呼び出し | 川越あさひ眼科</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #e8f4fd 0%, #d0e8f8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 48px;
      gap: 28px;
    }

    h1 {
      font-size: 1.4rem;
      color: #1565c0;
      letter-spacing: 0.08em;
      font-weight: bold;
    }

    .sub-lead {
      color: #4a6b8a;
      font-size: 0.9rem;
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
    }

    .panel {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,60,140,0.12);
      padding: 40px 48px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .number-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .num-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      background: #1565c0;
      color: #fff;
      box-shadow: 0 4px 12px rgba(21,101,192,0.35);
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }
    .num-btn:active { transform: scale(0.93); }
    .num-btn:hover  { background: #1976d2; }

    .number-display {
      font-size: 4rem;
      font-weight: bold;
      color: #1565c0;
      width: 140px;
      text-align: center;
      letter-spacing: 0.05em;
      border: none;
      border-bottom: 3px solid #1565c0;
      background: transparent;
      outline: none;
      -moz-appearance: textfield;
    }
    .number-display::-webkit-outer-spin-button,
    .number-display::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .number-display:focus { border-bottom-color: #0d47a1; }

    .call-btn {
      padding: 18px 60px;
      font-size: 1.6rem;
      font-weight: bold;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, #06c755, #05a648);
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.12em;
      box-shadow: 0 6px 20px rgba(6,199,85,0.4);
      transition: background 0.15s, transform 0.1s, box-shadow 0.1s;
    }
    .call-btn:hover  { background: linear-gradient(135deg, #0bd162, #06c755); box-shadow: 0 8px 24px rgba(6,199,85,0.5); }
    .call-btn:active { transform: scale(0.97); }
    .call-btn:disabled {
      background: #b0bec5;
      box-shadow: none;
      cursor: default;
    }

    .status-line {
      min-height: 1.4em;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 0.04em;
    }
    .status-line.sent    { color: #06a648; }
    .status-line.unsent  { color: #e65100; }
    .status-line.error   { color: #c62828; }

    /* ── 履歴パネル ── */
    .history-panel {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,60,140,0.12);
      padding: 24px 32px;
      width: 100%;
      max-width: 480px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .history-title {
      font-size: 1.1rem;
      color: #1565c0;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .clear-btn {
      padding: 6px 18px;
      font-size: 0.85rem;
      border: 1.5px solid #b0bec5;
      border-radius: 20px;
      background: #fff;
      color: #607d8b;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .clear-btn:hover { background: #eceff1; color: #37474f; }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 40px;
    }

    .history-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e6f9ee;
      color: #06a648;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 24px;
      letter-spacing: 0.03em;
    }
    .history-chip.unsent {
      background: #fff3e0;
      color: #e65100;
    }

    .history-chip-label {
      cursor: pointer;
      user-select: none;
    }

    .history-chip.visited {
      background: #cfd8dc;
      color: #37474f;
    }

    .history-chip-del {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.08);
      color: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .history-chip-del:hover { background: rgba(0,0,0,0.18); }

    .history-empty {
      color: #b0bec5;
      font-size: 0.9rem;
      align-self: center;
    }

    /* ── LINE登録中パネル ── */
    .registered-panel {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,60,140,0.12);
      padding: 24px 32px;
      width: 100%;
      max-width: 480px;
    }

    .registered-title {
      font-size: 1.1rem;
      color: #1565c0;
      font-weight: bold;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      display: block;
    }

    .registered-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 40px;
    }

    .registered-chip {
      border: 1.5px solid #90caf9;
      background: #e3f2fd;
      color: #1565c0;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 24px;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .registered-chip:hover  { background: #bbdefb; }
    .registered-chip:active { transform: scale(0.95); }

    .registered-empty {
      color: #b0bec5;
      font-size: 0.9rem;
      align-self: center;
    }

    /* ── 通知トースト ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a237e;
      color: #fff;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 1rem;
      letter-spacing: 0.08em;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>LINE呼び出し</h1>
  <p class="sub-lead">外出中の患者さんがLINEで受付番号を登録している場合、番号を入力して「呼び出す」を押すとLINEに通知が届きます。院内表示・音声とは連動しません。</p>

  <div class="panel">
    <div class="number-row">
      <button class="num-btn" id="btnMinus">−</button>
      <input class="number-display" type="number" id="inputNumber" value="1" min="1" max="100">
      <button class="num-btn" id="btnPlus">＋</button>
    </div>

    <button class="call-btn" id="callBtn">呼び出す</button>

    <div class="status-line" id="statusLine"></div>
  </div>

  <div class="registered-panel">
    <span class="registered-title">現在LINE登録中の番号</span>
    <div class="registered-list" id="registeredList">
      <span class="registered-empty" id="registeredEmpty">現在登録はありません</span>
    </div>
  </div>

  <div class="history-panel">
    <div class="history-header">
      <span class="history-title">送信履歴</span>
      <button class="clear-btn" id="clearBtn">クリア</button>
    </div>
    <div class="history-list" id="historyList">
      <span class="history-empty" id="historyEmpty">まだ送信履歴はありません</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Firebase ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAM1kw9lv5z9UO1vi5R5ecT7hcIMQQt_MM",
      authDomain:        "kawagoeasahi-72e5d.firebaseapp.com",
      databaseURL:       "https://kawagoeasahi-72e5d-default-rtdb.firebaseio.com",
      projectId:         "kawagoeasahi-72e5d",
      storageBucket:     "kawagoeasahi-72e5d.firebasestorage.app",
      messagingSenderId: "351069837644",
      appId:             "1:351069837644:web:da3a3c8e877aee299017e9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const registrationsRef = db.ref('lineRegistrations');

    let inputNum = 1;
    const inputNumberEl  = document.getElementById('inputNumber');
    const callBtn        = document.getElementById('callBtn');
    const statusLineEl   = document.getElementById('statusLine');
    const historyListEl  = document.getElementById('historyList');
    const historyEmptyEl = document.getElementById('historyEmpty');
    const registeredListEl  = document.getElementById('registeredList');
    const registeredEmptyEl = document.getElementById('registeredEmpty');
    const toastEl = document.getElementById('toast');

    let history = [];
    let knownRegisteredNumbers = new Set();
    let isFirstRegistrationSnapshot = true;

    document.getElementById('btnMinus').addEventListener('click', () => {
      if (inputNum > 1) { inputNum--; renderInput(); }
    });
    document.getElementById('btnPlus').addEventListener('click', () => {
      if (inputNum < 100) { inputNum++; renderInput(); }
    });
    inputNumberEl.addEventListener('input', () => {
      let v = parseInt(inputNumberEl.value, 10);
      if (isNaN(v) || v < 1) v = 1;
      if (v > 100) v = 100;
      inputNum = v;
    });
    inputNumberEl.addEventListener('blur', () => { renderInput(); });
    inputNumberEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') callBtn.click();
    });

    function renderInput() { inputNumberEl.value = inputNum; }

    document.getElementById('clearBtn').addEventListener('click', () => {
      history = [];
      renderHistory();
    });

    callBtn.addEventListener('click', async () => {
      const num = inputNum;
      callBtn.disabled = true;
      setStatus(`${num}番を送信中...`, '');

      try {
        const res = await fetch('/api/line-push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ number: num })
        });
        const data = await res.json();

        if (data.sent) {
          setStatus(`${num}番へLINE通知を送信しました`, 'sent');
        } else {
          setStatus(`${num}番はLINE未登録です`, 'unsent');
        }
        history.unshift({ id: Date.now() + Math.random(), number: num, sent: !!data.sent, visited: false });
        renderHistory();
      } catch (e) {
        setStatus('送信に失敗しました。通信環境を確認してください', 'error');
      } finally {
        callBtn.disabled = false;
      }
    });

    function setStatus(msg, kind) {
      statusLineEl.textContent = msg;
      statusLineEl.className = 'status-line' + (kind ? ' ' + kind : '');
    }

    function renderHistory() {
      historyListEl.innerHTML = '';
      if (history.length === 0) {
        historyListEl.appendChild(historyEmptyEl);
        historyEmptyEl.style.display = '';
        return;
      }
      historyEmptyEl.style.display = 'none';
      history.forEach(item => {
        const chip = document.createElement('span');
        chip.className = 'history-chip' + (item.sent ? '' : ' unsent') + (item.visited ? ' visited' : '');

        const label = document.createElement('span');
        label.className = 'history-chip-label';
        label.textContent = `${item.visited ? '✓ ' : ''}${item.number}番${item.sent ? '' : '（未登録）'}`;
        label.title = '来院済みに切り替え';
        label.addEventListener('click', () => {
          item.visited = !item.visited;
          renderHistory();
        });

        const del = document.createElement('button');
        del.className = 'history-chip-del';
        del.textContent = '×';
        del.title = `${item.number}番の履歴を削除`;
        del.addEventListener('click', () => {
          history = history.filter(h => h.id !== item.id);
          renderHistory();
        });

        chip.appendChild(label);
        chip.appendChild(del);
        historyListEl.appendChild(chip);
      });
    }

    // ── Firebase リアルタイム受信：LINE登録状況 ────────────────
    registrationsRef.on('value', snap => {
      const data = snap.val() || {};
      const currentNumbers = Object.keys(data).map(Number).sort((a, b) => a - b);

      if (!isFirstRegistrationSnapshot) {
        currentNumbers.forEach(n => {
          if (!knownRegisteredNumbers.has(n)) {
            showToast(`${n}番が登録されました`);
          }
        });
      }
      isFirstRegistrationSnapshot = false;
      knownRegisteredNumbers = new Set(currentNumbers);

      renderRegistered(currentNumbers);
    });

    function renderRegistered(numbers) {
      registeredListEl.innerHTML = '';
      if (numbers.length === 0) {
        registeredListEl.appendChild(registeredEmptyEl);
        registeredEmptyEl.style.display = '';
        return;
      }
      registeredEmptyEl.style.display = 'none';
      numbers.forEach(n => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'registered-chip';
        chip.textContent = `${n}番`;
        chip.title = 'クリックで番号を入力欄にセット';
        chip.addEventListener('click', () => {
          inputNum = n;
          renderInput();
        });
        registeredListEl.appendChild(chip);
      });
    }

    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
    }

    renderInput();
    renderHistory();
  </script>
</body>
</html>
